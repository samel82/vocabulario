<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulario Interactivo - Francés & Italiano</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #FFF5E4 0%, #FFE5D4 100%);
            color: #1A1A2E;
            min-height: 100vh;
            padding: 15px;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 900;
            color: #FF6B35;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.8;
        }

        .controls {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            min-width: 120px;
            padding: 15px;
            border: none;
            background: #FFF5E4;
            color: #1A1A2E;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #FF6B35, #F7931E);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,107,53,0.3);
        }

        .search-box {
            margin-bottom: 15px;
        }

        .search-box input {
            width: 100%;
            padding: 15px;
            border: 2px solid #FFF5E4;
            border-radius: 12px;
            font-size: 1rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: #00A8E8;
        }

        .mode-toggle {
            display: flex;
            gap: 10px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #00A8E8;
            background: transparent;
            color: #00A8E8;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: #00A8E8;
            color: white;
        }

        /* Modo Tabla */
        .table-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #FF6B35, #F7931E);
            color: white;
        }

        th {
            padding: 15px 10px;
            text-align: left;
            font-weight: 700;
            position: sticky;
            top: 0;
        }

        tbody tr {
            transition: all 0.3s;
        }

        tbody tr:nth-child(even) {
            background: #FFF5E4;
        }

        tbody tr:hover {
            background: #FFE5D4;
            transform: scale(1.01);
        }

        td {
            padding: 15px 10px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .word-cell {
            font-weight: 700;
            font-size: 1.3rem;
            color: #FF6B35;
        }

        .audio-btn {
            background: #00A8E8;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .audio-btn:active {
            transform: scale(0.9);
        }

        /* Modo Tarjetas */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card.flipped {
            background: linear-gradient(135deg, #FF6B35, #F7931E);
            color: white;
        }

        .card-number {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #FFF5E4;
            color: #1A1A2E;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .card.flipped .card-number {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .card-word {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 10px;
            color: #FF6B35;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card.flipped .card-word {
            color: white;
        }

        .card-pronunciation {
            font-size: 1.1rem;
            color: #F7931E;
            margin-bottom: 10px;
        }

        .card.flipped .card-pronunciation {
            color: rgba(255,255,255,0.9);
        }

        .card-translation {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 15px;
            padding: 12px;
            background: #FFF5E4;
            border-radius: 10px;
            border-left: 4px solid #00A8E8;
        }

        .card.flipped .card-translation {
            background: rgba(255,255,255,0.15);
            border-left-color: white;
            color: white;
        }

        .card-mnemonic {
            font-style: italic;
            line-height: 1.6;
            padding: 15px;
            background: #FFF9F0;
            border-radius: 10px;
            border: 2px dashed #F7931E;
        }

        .card.flipped .card-mnemonic {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
            color: white;
        }

        /* Modo Fonemas */
        .phonemes-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .phoneme-section {
            margin-bottom: 40px;
        }

        .phoneme-section h2 {
            color: #FF6B35;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 3px solid #F7931E;
            padding-bottom: 10px;
        }

        .phonemes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .phoneme-card {
            background: #FFF9F0;
            border: 2px solid #FFE5D4;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }

        .phoneme-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: #FF6B35;
        }

        .phoneme-symbol {
            font-size: 3rem;
            font-weight: 700;
            color: #FF6B35;
            margin-bottom: 10px;
        }

        .phoneme-example {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
            font-style: italic;
        }

        .phoneme-audio {
            margin-top: 10px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            
            table {
                font-size: 0.85rem;
            }
            
            th, td {
                padding: 10px 5px;
            }
            
            .word-cell {
                font-size: 1.1rem;
            }

            .phonemes-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>

            const html = `
                <table>
                    <thead>
                        <tr>
                            <th>N°</th>
                            <th>🔊</th>
                            <th>Palabra</th>
                            <th>Pronunciación</th>
                            <th>Traducción</th>
                            <th>Frase Mnemotécnica</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.map(item => `
                            <tr>
                                <td>${item.num}</td>
                                <td>
                                    <button class="audio-btn" onclick="playAudio('${item.palabra}')">🔊</button>
                                </td>
                                <td class="word-cell">${item.palabra}</td>
                                <td>${item.pronunciacion}</td>
                                <td><strong>${item.traduccion}</strong></td>
                                <td style="font-style: italic;">${item.mnemotecnica}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('tableView').innerHTML = html;
        }

        function renderCards(data) {
            const html = data.map(item => `
                <div class="card ${flippedCards.has(item.num) ? 'flipped' : ''}" 
                     onclick="toggleCard(${item.num})" 
                     style="position: relative;">
                    <div class="card-number">${item.num}</div>
                    <div class="card-word">
                        ${item.palabra}
                        <button class="audio-btn" onclick="event.stopPropagation(); playAudio('${item.palabra}')">🔊</button>
                    </div>
                    <div class="card-pronunciation">${item.pronunciacion}</div>
                    <div class="card-translation">${item.traduccion}</div>
                    <div class="card-mnemonic">💡 ${item.mnemotecnica}</div>
                </div>
            `).join('');
            document.getElementById('cardsView').innerHTML = html;
        }

        function renderPhonemes() {
            const fonemas = currentLang === 'frances' ? fonemasFrances : fonemasItaliano;
            
            let html = '';
            for (const [categoria, items] of Object.entries(fonemas)) {
                html += `
                    <div class="phoneme-section">
                        <h2>${categoria}</h2>
                        <div class="phonemes-grid">
                            ${items.map(fonema => `
                                <div class="phoneme-card">
                                    <div class="phoneme-symbol">/${fonema.simbolo}/</div>
                                    <div class="phoneme-example">Ej: ${fonema.ejemplo}</div>
                                    <div class="phoneme-audio">
                                        <button class="audio-btn" onclick="playAudio('${fonema.palabra}')">
                                            🔊
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('phonemesView').innerHTML = html;
        }

        function toggleCard(num) {
            if (flippedCards.has(num)) {
                flippedCards.delete(num);
            } else {
                flippedCards.add(num);
            }
            render();
        }

        function render() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let data = getData();
            
            if (currentLang === 'fonemas') {
                document.getElementById('tableView').classList.add('hidden');
                document.getElementById('cardsView').classList.add('hidden');
                document.getElementById('phonemesView').classList.remove('hidden');
                document.getElementById('searchContainer').classList.add('hidden');
                document.getElementById('modeContainer').classList.add('hidden');
                renderPhonemes();
                return;
            }
            
            document.getElementById('searchContainer').classList.remove('hidden');
            document.getElementById('modeContainer').classList.remove('hidden');
            document.getElementById('phonemesView').classList.add('hidden');
            
            if (searchTerm) {
                data = data.filter(item =>
                    item.palabra.toLowerCase().includes(searchTerm) ||
                    item.traduccion.toLowerCase().includes(searchTerm) ||
                    item.mnemotecnica.toLowerCase().includes(searchTerm)
                );
            }

            if (currentMode === 'tabla') {
                document.getElementById('tableView').classList.remove('hidden');
                document.getElementById('cardsView').classList.add('hidden');
                renderTable(data);
            } else {
                document.getElementById('tableView').classList.add('hidden');
                document.getElementById('cardsView').classList.remove('hidden');
                renderCards(data);
            }
        }

        // Event listeners
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentLang = this.dataset.lang;
                flippedCards.clear();
                render();
            });
        });

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentMode = this.dataset.mode;
                render();
            });
        });

        document.getElementById('searchInput').addEventListener('input', render);

        // Render inicial
        render();
    </script>
</body>
</html>
