<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulario 500 - Francés & Italiano</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #FFF5E4 0%, #FFE5D4 100%);
            color: #1A1A2E;
            min-height: 100vh;
            padding: 15px;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 900;
            color: #FF6B35;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.8;
        }

        .stats {
            text-align: center;
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .stat-item {
            padding: 10px;
            background: #FFF9F0;
            border-radius: 10px;
            border-left: 4px solid #FF6B35;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 900;
            color: #FF6B35;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .controls {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            min-width: 120px;
            padding: 15px;
            border: none;
            background: #FFF5E4;
            color: #1A1A2E;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #FF6B35, #F7931E);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,107,53,0.3);
        }

        .search-box {
            margin-bottom: 15px;
        }

        .search-box input {
            width: 100%;
            padding: 15px;
            border: 2px solid #FFF5E4;
            border-radius: 12px;
            font-size: 1rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: #00A8E8;
        }

        .mode-toggle {
            display: flex;
            gap: 10px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #00A8E8;
            background: transparent;
            color: #00A8E8;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: #00A8E8;
            color: white;
        }

        .table-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #FF6B35, #F7931E);
            color: white;
        }

        th {
            padding: 15px 10px;
            text-align: left;
            font-weight: 700;
            position: sticky;
            top: 0;
        }

        tbody tr {
            transition: all 0.3s;
        }

        tbody tr:nth-child(even) {
            background: #FFF5E4;
        }

        tbody tr:hover {
            background: #FFE5D4;
            transform: scale(1.01);
        }

        td {
            padding: 15px 10px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .word-cell {
            font-weight: 700;
            font-size: 1.3rem;
            color: #FF6B35;
        }

        .audio-btn {
            background: #00A8E8;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .audio-btn:active {
            transform: scale(0.9);
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card.flipped {
            background: linear-gradient(135deg, #FF6B35, #F7931E);
            color: white;
        }

        .card-number {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #FFF5E4;
            color: #1A1A2E;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .card.flipped .card-number {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .card-word {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 10px;
            color: #FF6B35;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card.flipped .card-word {
            color: white;
        }

        .card-pronunciation {
            font-size: 1.1rem;
            color: #F7931E;
            margin-bottom: 10px;
        }

        .card.flipped .card-pronunciation {
            color: rgba(255,255,255,0.9);
        }

        .card-translation {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 15px;
            padding: 12px;
            background: #FFF5E4;
            border-radius: 10px;
            border-left: 4px solid #00A8E8;
        }

        .card.flipped .card-translation {
            background: rgba(255,255,255,0.15);
            border-left-color: white;
            color: white;
        }

        

        .phonemes-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .phoneme-section {
            margin-bottom: 40px;
        }

        .phoneme-section h2 {
            color: #FF6B35;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 3px solid #F7931E;
            padding-bottom: 10px;
        }

        .phonemes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .phoneme-card {
            background: #FFF9F0;
            border: 2px solid #FFE5D4;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }

        .phoneme-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: #FF6B35;
        }

        .phoneme-symbol {
            font-size: 3rem;
            font-weight: 700;
            color: #FF6B35;
            margin-bottom: 10px;
        }

        .phoneme-example {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
            font-style: italic;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            
            table {
                font-size: 0.85rem;
            }
            
            th, td {
                padding: 10px 5px;
            }
            
            .word-cell {
                font-size: 1.1rem;
            }

            .phonemes-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>

        function playAudio(palabra) {
            const utterance = new SpeechSynthesisUtterance(palabra);
            utterance.lang = getLang();
            utterance.rate = 0.8;
            speechSynthesis.cancel();
            speechSynthesis.speak(utterance);
        }

        function playPhoneme(palabra, lang) {
            const utterance = new SpeechSynthesisUtterance(palabra);
            utterance.lang = lang;
            utterance.rate = 0.7;
            speechSynthesis.cancel();
            speechSynthesis.speak(utterance);
        }

        function updateStats(filteredCount) {

            document.getElementById('statGroups').textContent = Math.ceil(totalData.length / 50);
        }

        function renderPhonemes() {
            let fonemas, langCode, langName;
            if (window.phonemeLang === 'italiano') {
                fonemas = fonemasItaliano;
                langCode = 'it-IT';
                langName = 'Italiano';
            } else {
                fonemas = fonemasFrances;
                langCode = 'fr-FR';
                langName = 'Francés';
            }
            
            let html = `
                <div style="margin-bottom: 30px; text-align: center;">
                    <h2 style="color: #FF6B35; margin-bottom: 20px; font-size: 1.8rem;">
                        Fonemas del ${langName}
                    </h2>
                    <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                        <button onclick="window.phonemeLang='frances'; renderPhonemes();" 
                                style="padding: 12px 30px; border: 2px solid #00A8E8; background: ${window.phonemeLang === 'frances' ? '#00A8E8' : 'white'}; color: ${window.phonemeLang === 'frances' ? 'white' : '#00A8E8'}; font-weight: 700; border-radius: 10px; cursor: pointer; font-size: 1rem;">
                            🇫🇷 Francés
                        </button>
                        <button onclick="window.phonemeLang='italiano'; renderPhonemes();" 
                                style="padding: 12px 30px; border: 2px solid #00A8E8; background: ${window.phonemeLang === 'italiano' ? '#00A8E8' : 'white'}; color: ${window.phonemeLang === 'italiano' ? 'white' : '#00A8E8'}; font-weight: 700; border-radius: 10px; cursor: pointer; font-size: 1rem;">
                            🇮🇹 Italiano
                        </button>
                    </div>
                </div>
            `;
            
            for (const [categoria, items] of Object.entries(fonemas)) {
                html += `
                    <div class="phoneme-section">
                        <h2>${categoria}</h2>
                        <div class="phonemes-grid">
                            ${items.map(fonema => `
                                <div class="phoneme-card">
                                    <div class="phoneme-symbol">/${fonema.simbolo}/</div>
                                    <div class="phoneme-example">Ej: ${fonema.ejemplo}</div>
                                    <div class="phoneme-audio">
                                        <button class="audio-btn" onclick="playPhoneme('${fonema.palabra}', '${langCode}')">
                                            🔊
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('phonemesView').innerHTML = html;
        }

        function toggleCard(num) {
            if (flippedCards.has(num)) {
                flippedCards.delete(num);
            } else {
                flippedCards.add(num);
            }
            render();
        }

        function render() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let data = getData();
            
            const activeTab = document.querySelector('.tab-btn.active');
            const isFonemasTab = activeTab && activeTab.dataset.lang === 'fonemas';
            
            if (isFonemasTab) {
                document.getElementById('tableView').classList.add('hidden');
                document.getElementById('cardsView').classList.add('hidden');
                document.getElementById('phonemesView').classList.remove('hidden');
                document.getElementById('searchContainer').classList.add('hidden');
                document.getElementById('modeContainer').classList.add('hidden');
                document.querySelector('.stats').classList.add('hidden');
                renderPhonemes();
                return;
            }
            
            document.getElementById('searchContainer').classList.remove('hidden');
            document.getElementById('modeContainer').classList.remove('hidden');
            document.getElementById('phonemesView').classList.add('hidden');
            document.querySelector('.stats').classList.remove('hidden');
            
            if (searchTerm) {
                data = data.filter(item =>
                    item.palabra.toLowerCase().includes(searchTerm) ||
                    item.traduccion.toLowerCase().includes(searchTerm)
                );
            }

            if (currentMode === 'tabla') {
                document.getElementById('tableView').classList.remove('hidden');
                document.getElementById('cardsView').classList.add('hidden');
                renderTable(data);
            } else {
                document.getElementById('tableView').classList.add('hidden');
                document.getElementById('cardsView').classList.remove('hidden');
                renderCards(data);
            }
        }

        // Event listeners
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const newLang = this.dataset.lang;
                
                if (newLang !== 'fonemas') {
                    currentLang = newLang;
                    window.phonemeLang = newLang;
                }
                
                flippedCards.clear();
                render();
            });
        });

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentMode = this.dataset.mode;
                render();
            });
        });

        document.getElementById('searchInput').addEventListener('input', render);

        // Render inicial
        render();
    </script>
</body>
</html>
